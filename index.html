<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sync - v13</title>
<style>
  :root {
    --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; --text-sub: #9e9e9e; --border: #333333;
    --primary: #64b5f6; --habit: #81c784; --event: #e57373; --milestone: #ffb74d; --modal-bg: rgba(0,0,0,0.8);
  }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: var(--text-main); margin: 0; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 400px; background-color: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  
  .header { padding: 15px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border); text-align: center; display: flex; justify-content: space-between; align-items: center; }
  .settings-btn { cursor: pointer; font-size: 1.2rem; }
  
  .tabs { display: flex; border-bottom: 1px solid var(--border); background-color: var(--bg-color); position: sticky; top: 0; z-index: 100; }
  .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; color: var(--text-sub); font-size: 0.9rem; }
  .tab.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); font-weight: bold; }
  .content { flex: 1; overflow-y: auto; display: none; padding-bottom: 80px; }
  .content.active { display: block; }
  h3 { font-size: 0.85rem; color: var(--text-sub); margin: 25px 15px 10px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;}

  /* タイムライン */
  .timeline-container { position: relative; margin: 10px 15px 25px; background-color: var(--card-bg); border-radius: 8px; padding-top: 10px; padding-bottom: 10px; min-height: 200px; }
  .time-row { display: flex; height: 40px; position: relative; }
  .time-label { width: 45px; text-align: right; padding-right: 10px; font-size: 0.75rem; color: var(--text-sub); transform: translateY(-8px); }
  .time-line { flex: 1; border-top: 1px solid var(--border); }
  .event-block { position: absolute; left: 55px; right: 10px; border-radius: 6px; padding: 4px 8px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.2); box-sizing: border-box; cursor: pointer; }
  .event-title { font-size: 0.8rem; font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .event-time { font-size: 0.65rem; opacity: 0.8; margin-top: 2px; }
  .type-fixed { background-color: rgba(100,181,246,0.2); border-left: 4px solid var(--primary); color: #90caf9; }
  .type-habit { background-color: rgba(129,199,132,0.2); border-left: 4px solid var(--habit); color: #a5d6a7; }
  .type-event { background-color: rgba(229,115,115,0.2); border-left: 4px solid var(--event); color: #ef9a9a; }

  /* ToDoリスト */
  .todo-list { list-style: none; padding: 0 15px; margin: 0; }
  .todo-item { display: flex; align-items: center; background-color: var(--card-bg); padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; }
  .todo-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0;}
  .todo-item.done span.t-title { text-decoration: line-through; color: var(--text-sub); }
  .todo-tag { font-size: 0.7rem; background: var(--border); padding: 2px 6px; border-radius: 4px; margin-right: 8px; color: var(--habit); display: inline-block; margin-bottom: 2px;}

  /* カレンダー */
  .calendar-wrapper { background-color: var(--card-bg); padding: 15px; margin: 0 15px 15px; border-radius: 8px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; }
  .cal-nav { cursor: pointer; padding: 5px 10px; background: var(--border); border-radius: 4px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
  .cal-day-name { color: var(--text-sub); font-size: 0.75rem; margin-bottom: 5px; }
  .cal-day { position: relative; padding: 8px 0; font-size: 0.9rem; border-radius: 50%; width: 32px; height: 32px; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .cal-day.active { background-color: var(--primary); color: #000; font-weight: bold; }
  .dot { position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%; }
  .dot-event { background: var(--event); left: 35%; }
  .dot-milestone { background: var(--milestone); left: 55%; }
  .cal-day.empty { visibility: hidden; }

  .memo-area { width: calc(100% - 30px); min-height: 80px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; padding: 12px; margin: 0 15px 30px; box-sizing: border-box; font-size: 0.9rem; resize: none; }

  /* 長期・フォルダ */
  .folder-section { background-color: #252525; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
  .folder-header { padding: 10px 15px; background: #2a2a2a; display: flex; justify-content: space-between; cursor: pointer; align-items: center; border-radius: 8px 8px 0 0;}
  .folder-title-input { background: transparent; border: none; color: var(--milestone); font-weight: bold; font-size: 0.9rem; width: 70%; outline: none; }
  .card { background-color: var(--card-bg); border-radius: 8px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--border); position: relative;}
  .card-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
  .ctrl-btn { cursor: pointer; font-size: 0.8rem; color: var(--text-sub); }
  .card-title { font-weight: bold; font-size: 0.95rem; color: var(--text-main); padding-right: 60px; }
  .card-sub { font-size: 0.8rem; color: var(--text-sub); margin-top: 5px; }
  .progress-bg { background-color: var(--border); border-radius: 4px; height: 6px; width: 100%; margin-top: 8px; overflow: hidden; }
  .progress-fill { background-color: var(--habit); height: 100%; border-radius: 4px; }
  .step-bar { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.7rem; }
  .step { flex: 1; text-align: center; color: var(--text-sub); padding-bottom: 5px; border-bottom: 2px solid var(--border); }
  .step.done { color: var(--primary); border-color: var(--primary); }
  .step.active { color: var(--milestone); border-color: var(--milestone); font-weight: bold; }

  /* モーダル */
  .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background-color: var(--primary); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; z-index: 1000; }
  @media (min-width: 400px) { .fab { right: calc(50% - 180px); } }
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); display: none; justify-content: center; align-items: center; z-index: 2000; }
  .modal { background: var(--bg-color); width: 90%; max-width: 350px; border-radius: 12px; padding: 20px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto;}
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 5px; }
  .form-control { width: 100%; padding: 10px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 6px; box-sizing: border-box; color-scheme: dark;}
  .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .btn { padding: 12px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-align: center;}
  .btn-save { background: var(--primary); color: #000; }
  .btn-cancel { background: var(--border); color: var(--text-main); }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div></div><div>Student Sync</div><div class="settings-btn" onclick="openSettingsModal()">⚙️</div>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchMainTab('schedule')">スケジュール</div>
    <div class="tab" onclick="switchMainTab('long-term')">長期進捗</div>
  </div>

  <div id="schedule" class="content active">
    <h3 id="current-date-display"></h3>
    <div class="timeline-container" id="timeline-container"></div>
    <h3>今日のタスク</h3>
    <ul class="todo-list" id="todo-list"></ul>
    <h3>📅 カレンダー</h3>
    <div class="calendar-wrapper">
      <div class="cal-header">
        <div class="cal-nav" onclick="changeMonth(-1)">◀︎</div>
        <div id="cal-month-display"></div>
        <div class="cal-nav" onclick="changeMonth(1)">▶︎</div>
      </div>
      <div class="cal-grid" id="calendar-grid"></div>
    </div>
    <textarea id="daily-memo" class="memo-area" placeholder="今日のメモ..." oninput="saveMemo()"></textarea>
  </div>

  <div id="long-term" class="content card-container"></div>
  <div class="fab" onclick="handleFabClick()">＋</div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>追加</h2>
    <div class="tabs" style="margin-bottom:15px; border:none;">
      <div class="tab active" id="tab-event" onclick="switchModalTab('event')">予定</div>
      <div class="tab" id="tab-task" onclick="switchModalTab('task')">タスク</div>
    </div>
    <div id="form-event">
      <div class="form-group"><label>日付</label><input type="date" id="event-date" class="form-control"></div>
      <div class="form-group"><label>タイトル</label><input type="text" id="event-title" class="form-control"></div>
      <div class="form-group">
        <label>種類</label>
        <select id="event-type" class="form-control" onchange="onChangeEventType()">
          <option value="fixed">🔵 固定（毎週）</option>
          <option value="habit">🟢 長期目標枠（毎週）</option>
          <option value="event">🔴 突発（今日のみ）</option>
        </select>
      </div>
      <div class="form-group" id="event-goal-group" style="display:none;">
        <label>連動する長期目標</label><select id="event-goal" class="form-control" onchange="onChangeEventGoal()"></select>
      </div>
      <div class="form-group" id="event-quota-input-group" style="display:none;">
        <label id="event-quota-label" style="color:var(--habit);">進める量（ページ等）</label>
        <input type="number" id="event-quota-val" class="form-control" value="10">
      </div>
      <div style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1;"><label>開始</label><input type="time" id="event-start" class="form-control" value="12:00"></div>
        <div class="form-group" style="flex:1;"><label>終了</label><input type="time" id="event-end" class="form-control" value="13:00"></div>
      </div>
    </div>
    <div id="form-task" style="display:none;">
      <div class="form-group"><label>日付</label><input type="date" id="task-date" class="form-control"></div>
      <div class="form-group"><label>タスク内容</label><input type="text" id="task-title" class="form-control"></div>
      <div class="form-group"><label>連動する長期目標</label><select id="task-goal" class="form-control" onchange="onChangeTaskGoal()"></select></div>
      <div class="form-group" id="task-progress-group" style="display:none;"><label>進める量</label><input type="number" id="task-progress" class="form-control" value="1"></div>
    </div>
    <div class="modal-btns"><button class="btn btn-save" onclick="saveNewItem()">保存</button><button class="btn btn-cancel" onclick="closeModal('add-modal')">キャンセル</button></div>
  </div>
</div>

<div class="modal-overlay" id="add-goal-modal">
  <div class="modal">
    <h2>長期目標の作成</h2>
    <div class="form-group"><label>目標タイトル</label><input type="text" id="goal-title" class="form-control"></div>
    <div class="form-group">
      <label>進行度の種類</label>
      <select id="goal-type" class="form-control" onchange="onChangeGoalType()">
        <option value="time">⏳ 時間（累積）</option>
        <option value="quota">📚 ノルマ（自然数）</option>
        <option value="milestone">🏢 マイルストーン</option>
      </select>
    </div>
    <div id="goal-folder-group" class="form-group" style="display:none;"><label>所属フォルダ</label><select id="goal-folder-select" class="form-control"></select></div>
    <div id="goal-time-group" class="form-group"><label>単位</label><input type="text" id="goal-time-unit" class="form-control" value="時間"></div>
    <div id="goal-quota-group" class="form-group" style="display:none;"><label>全体量と単位</label><div style="display:flex; gap:10px;"><input type="number" id="goal-quota-max" class="form-control" value="100"><input type="text" id="goal-quota-unit" class="form-control" value="ページ"></div></div>
    <div id="goal-milestone-group" class="form-group" style="display:none;"><label>ステップ (カンマ区切り)</label><input type="text" id="goal-milestone-steps" class="form-control" value="ステップ1, ステップ2"></div>
    <div class="modal-btns"><button class="btn btn-save" onclick="saveNewGoal()">作成</button><button class="btn btn-cancel" onclick="closeModal('add-goal-modal')">キャンセル</button></div>
  </div>
</div>

<div class="modal-overlay" id="add-folder-modal"><div class="modal"><h2>フォルダ作成</h2><div class="form-group"><label>フォルダ名</label><input type="text" id="folder-name-input" class="form-control"></div><div class="modal-btns"><button class="btn btn-save" onclick="saveNewFolder()">作成</button><button class="btn btn-cancel" onclick="closeModal('add-folder-modal')">キャンセル</button></div></div></div>

<div class="modal-overlay" id="delete-choice-modal">
  <div class="modal">
    <h2>削除の確認</h2>
    <div class="modal-btns">
      <button class="btn btn-save" style="background:#e57373;" onclick="executeDeleteEvent('only')">今回のみ削除</button>
      <button class="btn btn-save" style="background:#ef5350;" onclick="executeDeleteEvent('future')">今後すべて削除</button>
      <button class="btn btn-cancel" onclick="closeModal('delete-choice-modal')">キャンセル</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>表示設定</h2>
    <div class="form-group"><label>起床時間（表示開始）</label><select id="setting-wake" class="form-control"></select></div>
    <div class="form-group"><label>就寝時間（表示終了）</label><select id="setting-sleep" class="form-control"></select></div>
    <div class="modal-btns">
      <button class="btn btn-save" onclick="saveSettings()">設定を保存</button>
      <button class="btn btn-cancel" onclick="closeModal('settings-modal')">閉じる</button>
    </div>
  </div>
</div>

<script>
  let appState = JSON.parse(localStorage.getItem('studentSyncData_v13')) || {
    settings: { startHour: 6, endHour: 24 },
    goals:[], folders:[], events:[], tasks:[], deletedInstances: [], memos: {}
  };

  const dayNames =['日', '月', '火', '水', '木', '金', '土'];
  let currentDateStr = new Date().toISOString().split('T')[0];
  let currentMonth = new Date();
  let currentMainTab = 'schedule';
  let pendingDeleteId = null;

  function renderAll() {
    const targetDateObj = new Date(currentDateStr);
    document.getElementById('current-date-display').innerText = `${targetDateObj.getMonth()+1}月${targetDateObj.getDate()}日 (${dayNames[targetDateObj.getDay()]})`;
    renderTimeline(targetDateObj);
    renderTasks(targetDateObj);
    renderCalendar();
    renderLongTerm();
    document.getElementById('daily-memo').value = appState.memos[currentDateStr] || "";
    localStorage.setItem('studentSyncData_v13', JSON.stringify(appState));
  }

  // --- タイムライン描画 ---
  function renderTimeline(targetDateObj) {
    const container = document.getElementById('timeline-container'); container.innerHTML = '';
    const start = appState.settings.startHour, end = appState.settings.endHour;
    for(let i = start; i <= end; i++) container.innerHTML += `<div class="time-row"><div class="time-label">${i % 24}:00</div><div class="time-line"></div></div>`;
    const dailyEvents = appState.events.filter(e => !appState.deletedInstances.some(d => d.id === e.id && d.date === currentDateStr) && (e.isRecurring ? e.dayOfWeek === targetDateObj.getDay() : e.date === currentDateStr));
    dailyEvents.forEach(e => {
      const s = e.start.split(':'), en = e.end.split(':');
      const top = (parseInt(s[0]) - start + parseInt(s[1])/60) * 40 + 10;
      const height = ((parseInt(en[0])*60+parseInt(en[1])) - (parseInt(s[0])*60+parseInt(s[1]))) / 60 * 40;
      if(top >= 0) container.innerHTML += `<div class="event-block type-${e.type}" style="top:${top}px; height:${height}px;" onclick="promptDeleteEvent(${e.id})"><div class="event-title">${e.title}</div><div class="event-time">${e.start}-${e.end}</div></div>`;
    });
  }

  // --- 長期目標タブ ---
  function renderLongTerm() {
    const container = document.getElementById('long-term');
    container.innerHTML = `<h3>⌛️ 時間計測型</h3>`;
    appState.goals.filter(g => g.type === 'time').forEach(g => container.innerHTML += createGoalCard(g));
    container.innerHTML += `<h3>📚 ノルマ達成型</h3>`;
    appState.goals.filter(g => g.type === 'quota').forEach(g => container.innerHTML += createGoalCard(g));
    container.innerHTML += `<h3>🏢 マイルストーン <span class="ctrl-btn" onclick="openFolderModal()">＋フォルダ作成</span></h3>`;
    appState.folders.forEach(f => {
      let fHtml = `<div class="folder-section"><div class="folder-header" onclick="toggleFolder(this)"><input type="text" class="folder-title-input" value="${f.name}" onchange="updateFolderName('${f.id}', this.value)" onclick="event.stopPropagation()"><span onclick="deleteFolder('${f.id}')">🗑</span></div><div class="folder-content">`;
      appState.goals.filter(g => g.type === 'milestone' && g.folderId === f.id).forEach(g => fHtml += createGoalCard(g));
      fHtml += `</div></div>`;
      container.innerHTML += fHtml;
    });
    const unfiled = appState.goals.filter(g => g.type === 'milestone' && !g.folderId);
    if(unfiled.length > 0) { container.innerHTML += `<h4>未分類</h4>`; unfiled.forEach(g => container.innerHTML += createGoalCard(g)); }
  }

  function createGoalCard(g) {
    let content = '';
    const idx = appState.goals.findIndex(x => x.id === g.id);
    if(g.type === 'time') content = `<div class="card-sub">累計: ${g.current.toFixed(1)} ${g.unit}</div>`;
    else if(g.type === 'quota') { const pct = Math.floor((g.current / g.max) * 100) || 0; content = `<div class="card-sub">${g.current} / ${g.max} ${g.unit}</div><div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>`; }
    else { let stepsHtml = '<div class="step-bar">'; g.steps.forEach((s, i) => stepsHtml += `<div class="step ${i < g.current ? 'done' : (i===g.current?'active':'')}">${s}</div>`); content = stepsHtml + '</div>'; }
    return `<div class="card" style="border-left-color:${g.type==='milestone'?'var(--milestone)':(g.type==='quota'?'var(--habit)':'var(--primary)')}"><div class="card-controls"><span class="ctrl-btn" onclick="moveGoal(${idx}, -1)">▲</span><span class="ctrl-btn" onclick="moveGoal(${idx}, 1)">▼</span><span class="ctrl-btn" onclick="deleteGoal('${g.id}')">🗑</span></div><div class="card-title">${g.title}</div>${content}</div>`;
  }

  // --- 設定モーダル ---
  function openSettingsModal() {
    const ws = document.getElementById('setting-wake'), ss = document.getElementById('setting-sleep');
    ws.innerHTML = ''; ss.innerHTML = '';
    for(let i=0; i<24; i++) { const o = `<option value="${i}">${i}:00</option>`; ws.innerHTML+=o; ss.innerHTML+=o; }
    ws.value = appState.settings.startHour; ss.value = appState.settings.endHour;
    document.getElementById('settings-modal').style.display = 'flex';
  }
  function saveSettings() {
    appState.settings.startHour = parseInt(document.getElementById('setting-wake').value);
    appState.settings.endHour = parseInt(document.getElementById('setting-sleep').value);
    closeModal('settings-modal'); renderAll();
  }

  // --- 削除ロジック ---
  function promptDeleteEvent(id) {
    const ev = appState.events.find(x => x.id === id);
    if(!ev.isRecurring) {
      if(confirm('この予定を削除しますか？')) { appState.events = appState.events.filter(x => x.id !== id); renderAll(); }
    } else {
      pendingDeleteId = id;
      document.getElementById('delete-choice-modal').style.display = 'flex';
    }
  }
  function executeDeleteEvent(mode) {
    if(mode === 'only') appState.deletedInstances.push({ id: pendingDeleteId, date: currentDateStr });
    else appState.events = appState.events.filter(x => x.id !== pendingDeleteId);
    closeModal('delete-choice-modal'); renderAll();
  }

  // --- カレンダー印 ---
  function renderCalendar() {
    const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
    document.getElementById('cal-month-display').innerText = `${y}年 ${m+1}月`;
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '<div class="cal-day-name">月</div><div class="cal-day-name">火</div><div class="cal-day-name">水</div><div class="cal-day-name">木</div><div class="cal-day-name">金</div><div class="cal-day-name">土</div><div class="cal-day-name">日</div>';
    let startIdx = (new Date(y, m, 1).getDay() || 7) - 1;
    for(let i=0; i<startIdx; i++) grid.innerHTML += '<div class="cal-day empty"></div>';
    const days = new Date(y, m+1, 0).getDate();
    for(let d=1; d<=days; d++) {
      const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvents = appState.events.filter(e => !appState.deletedInstances.some(del => del.id === e.id && del.date === ds) && (e.date === ds || (e.isRecurring && e.dayOfWeek === new Date(ds).getDay())));
      const hasOneOff = dayEvents.some(e => e.type === 'event');
      const hasMilestone = dayEvents.some(e => { if(!e.goalId) return false; const g = appState.goals.find(x => x.id === e.goalId); return g && g.type === 'milestone'; });
      let dots = '';
      if(hasOneOff) dots += `<div class="dot dot-event"></div>`;
      if(hasMilestone) dots += `<div class="dot dot-milestone"></div>`;
      grid.innerHTML += `<div class="cal-day ${ds===currentDateStr?'active':''}" onclick="selectDate('${ds}')">${d}${dots}</div>`;
    }
  }

  // --- 共通ロジック ---
  function onChangeEventType() { const t = document.getElementById('event-type').value; document.getElementById('event-goal-group').style.display = t === 'habit' ? 'block' : 'none'; onChangeEventGoal(); }
  function onChangeEventGoal() { const gid = document.getElementById('event-goal').value; const g = appState.goals.find(x => x.id === gid); const group = document.getElementById('event-quota-input-group'); if (g && g.type === 'quota') { group.style.display = 'block'; document.getElementById('event-quota-label').innerText = `進捗に加算する量 (${g.unit})`; } else { group.style.display = 'none'; }}
  function onChangeGoalType() {
    const type = document.getElementById('goal-type').value;
    document.getElementById('goal-time-group').style.display = type==='time'?'block':'none';
    document.getElementById('goal-quota-group').style.display = type==='quota'?'block':'none';
    document.getElementById('goal-milestone-group').style.display = type==='milestone'?'block':'none';
    document.getElementById('goal-folder-group').style.display = type==='milestone'?'block':'none';
    if(type==='milestone') {
      let opts = '<option value="">(未分類)</option>';
      appState.folders.forEach(f => opts += `<option value="${f.id}">${f.name}</option>`);
      document.getElementById('goal-folder-select').innerHTML = opts;
    }
  }
  function handleFabClick() {
    if(currentMainTab === 'long-term') { document.getElementById('add-goal-modal').style.display='flex'; onChangeGoalType(); }
    else { updateGoalSelects(); document.getElementById('event-date').value = currentDateStr; document.getElementById('task-date').value = currentDateStr; document.getElementById('add-modal').style.display='flex'; }
  }
  function saveNewItem() {
    const isEvent = document.getElementById('form-event').style.display !== 'none';
    if(isEvent) {
      const d = document.getElementById('event-date').value, t = document.getElementById('event-type').value, gid = document.getElementById('event-goal').value;
      const g = appState.goals.find(x => x.id === gid);
      let qVal = (g && g.type === 'quota') ? parseFloat(document.getElementById('event-quota-val').value) || 0 : 0;
      appState.events.push({ id: Date.now(), title: document.getElementById('event-title').value, date: d, start: document.getElementById('event-start').value, end: document.getElementById('event-end').value, type: t, isRecurring: t !== 'event', dayOfWeek: new Date(d).getDay(), goalId: gid || null, quotaPlanned: qVal });
    } else {
      appState.tasks.push({ id: Date.now(), title: document.getElementById('task-title').value, date: document.getElementById('task-date').value, goalId: document.getElementById('task-goal').value, progressVal: parseFloat(document.getElementById('task-progress').value) || 0, done: false });
    }
    closeModal('add-modal'); renderAll();
  }
  function renderTasks(targetDateObj) {
    const list = document.getElementById('todo-list'); list.innerHTML = '';
    const dailyTasks = appState.tasks.filter(t => t.date === currentDateStr);
    const dailyEvents = appState.events.filter(e => !appState.deletedInstances.some(d => d.id === e.id && d.date === currentDateStr) && (e.isRecurring ? e.dayOfWeek === targetDateObj.getDay() : e.date === currentDateStr));
    dailyEvents.forEach(e => {
      if(e.type === 'habit' && e.goalId) {
        if(!dailyTasks.find(t => t.eventId === e.id)) {
          const g = appState.goals.find(x => x.id === e.goalId); if(!g) return;
          let val = (g.type === 'time') ? (parseInt(e.end.split(':')[0])*60+parseInt(e.end.split(':')[1]) - (parseInt(e.start.split(':')[0])*60+parseInt(e.start.split(':')[1])))/60 : (g.type === 'quota' ? e.quotaPlanned : 1);
          val = Math.round(val * 10) / 10;
          list.innerHTML += `<li class="todo-item" style="border:1px dashed var(--habit); background:none;"><input type="checkbox" onchange="createAndToggleTask(${e.id}, '${e.goalId}', '${e.title}', ${val})"><div style="flex:1;"><span class="todo-tag">${g.title} +${val}</span><br><span class="t-title">[枠] ${e.title}</span></div></li>`;
        }
      }
    });
    dailyTasks.forEach(t => {
      const g = appState.goals.find(x => x.id === t.goalId);
      list.innerHTML += `<li class="todo-item ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})"><div style="flex:1;">${g?`<span class="todo-tag">${g.title} +${t.progressVal}</span><br>`:''}<span class="t-title">${t.title}</span></div><span onclick="deleteTask(${t.id})" style="color:var(--event); cursor:pointer;">×</span></li>`;
    });
  }
  function updateGoalSelects() { let opts = '<option value="">なし</option>'; appState.goals.forEach(g => opts += `<option value="${g.id}">${g.title}</option>`); document.getElementById('event-goal').innerHTML = opts; document.getElementById('task-goal').innerHTML = opts; }
  function saveNewGoal() { const title = document.getElementById('goal-title').value; if(!title) return; const type = document.getElementById('goal-type').value; let g = { id: 'g'+Date.now(), title, type, current: 0 }; if(type === 'time') g.unit = document.getElementById('goal-time-unit').value; else if(type === 'quota') { g.max = parseInt(document.getElementById('goal-quota-max').value); g.unit = document.getElementById('goal-quota-unit').value; } else { g.steps = document.getElementById('goal-milestone-steps').value.split(',').map(s=>s.trim()); g.folderId = document.getElementById('goal-folder-select').value; } appState.goals.push(g); closeModal('add-goal-modal'); renderAll(); }
  function openFolderModal() { document.getElementById('add-folder-modal').style.display='flex'; }
  function saveNewFolder() { const name = document.getElementById('folder-name-input').value; if(!name) return; appState.folders.push({id: 'f'+Date.now(), name}); closeModal('add-folder-modal'); renderAll(); }
  function deleteFolder(id) { if(confirm('削除しますか？')) { appState.folders = appState.folders.filter(x=>x.id!==id); appState.goals.forEach(g=>{if(g.folderId===id) delete g.folderId;}); renderAll(); }}
  function saveMemo() { appState.memos[currentDateStr] = document.getElementById('daily-memo').value; saveToStorage(); }
  function switchMainTab(id) { currentMainTab = id; document.querySelectorAll('.tab').forEach(el => el.classList.remove('active')); document.querySelectorAll('.content').forEach(el => el.classList.remove('active')); event.currentTarget.classList.add('active'); document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).style.display='none'; }
  function selectDate(d) { currentDateStr = d; renderAll(); }
  function changeMonth(n) { currentMonth.setMonth(currentMonth.getMonth()+n); renderCalendar(); }
  function saveToStorage() { localStorage.setItem('studentSyncData_v13', JSON.stringify(appState)); }
  function toggleFolder(el) { const cont = el.nextElementSibling; cont.style.display = cont.style.display==='none'?'block':'none'; }
  function moveGoal(idx, dir) { const t = idx+dir; if(t>=0 && t<appState.goals.length) { [appState.goals[idx], appState.goals[t]] = [appState.goals[t], appState.goals[idx]]; renderAll(); } }
  function deleteGoal(id) { if(confirm('削除しますか？')) { appState.goals=appState.goals.filter(x=>x.id!==id); renderAll(); } }
  function toggleTask(id) { const t = appState.tasks.find(x => x.id === id); if(t) { t.done = !t.done; if(t.goalId) { const g = appState.goals.find(x => x.id === t.goalId); if(g) g.current += t.done ? t.progressVal : -t.progressVal; } } renderAll(); }
  function createAndToggleTask(eid, gid, title, val) { appState.tasks.push({ id: Date.now(), date: currentDateStr, title, done: true, goalId: gid, progressVal: val, eventId: eid }); const g = appState.goals.find(x => x.id === gid); if(g) g.current += val; renderAll(); }
  function deleteTask(id) { appState.tasks = appState.tasks.filter(x => x.id !== id); renderAll(); }
  function onChangeTaskGoal() { const g = appState.goals.find(x => x.id === document.getElementById('task-goal').value); document.getElementById('task-progress-group').style.display = (g && g.type !== 'milestone') ? 'block' : 'none'; }
  function switchModalTab(m) { document.getElementById('form-event').style.display = m==='event'?'block':'none'; document.getElementById('form-task').style.display = m==='task'?'block':'none'; document.getElementById('tab-event').classList.toggle('active', m==='event'); document.getElementById('tab-task').classList.toggle('active', m==='task'); }

  renderAll();
</script>
</body>
</html>
